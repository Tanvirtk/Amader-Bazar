<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — আমাদের বাজার</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css
">
</head>
<body>

<h1>Admin Dashboard</h1>
<p class="subtitle"> আমাদের বাজার — সব User, Order, Complaint এখানে দেখা যাবে</p>

<div class="tabs">
  <button class="tab-btn active" data-tab="users">Users <span class="count-badge" id="count-users">0</span></button>
  <button class="tab-btn" data-tab="orders">Orders <span class="count-badge" id="count-orders">0</span></button>
  <button class="tab-btn" data-tab="complaints">Complaints <span class="count-badge" id="count-complaints">0</span></button>
</div>

<div id="loading" class="loading">লোড হচ্ছে...</div>

<div class="panel active" id="panel-users">
  <div class="table-wrap"><table id="table-users"></table></div>
</div>
<div class="panel" id="panel-orders">
  <div class="table-wrap"><table id="table-orders"></table></div>
</div>
<div class="panel" id="panel-complaints">
  <div class="table-wrap"><table id="table-complaints"></table></div>
</div>

<script src="admin.js">

</script>
</body>
</html>
